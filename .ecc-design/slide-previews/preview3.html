<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview 3: Liquid Glass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
      color: #1a1a1a; 
      overflow: hidden;
      height: 100vh; height: 100dvh;
    }
    .slide {
      height: 100vh; height: 100dvh; 
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: clamp(2rem, 5vw, 4rem);
      text-align: center;
      position: relative;
      backdrop-filter: blur(10px);
    }
    .glass {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: clamp(2rem, 4vw, 3rem);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      max-width: 90%;
      opacity: 0; transform: translateY(40px) scale(0.95);
      animation: glassIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes glassIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    h1 { 
      font-size: clamp(3rem, 8vw, 5.5rem); 
      font-weight: 800; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      line-height: 1.1;
    }
    .subtitle { 
      font-size: clamp(1.4rem, 3.5vw, 2.2rem); 
      font-weight: 400; 
      color: #333;
      margin-bottom: 1rem;
      line-height: 1.3;
    }
    .tagline { 
      font-size: clamp(1rem, 2.5vw, 1.4rem); 
      font-weight: 300; 
      color: #666;
      font-style: italic;
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
      .glass { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <section class="slide">
    <div class="glass">
      <h1>Prism</h1>
      <p class="subtitle">The verification layer for AI-built software.</p>
      <p class="tagline">AI generates the code. Prism makes it safe to ship.</p>
    </div>
  </section>
</body>
</html>
