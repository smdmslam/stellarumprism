<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview 2: Geometric Bold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Orbitron', monospace; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); 
      color: #fff; 
      overflow: hidden;
      height: 100vh; height: 100dvh;
    }
    .slide {
      height: 100vh; height: 100dvh; 
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: clamp(2rem, 5vw, 4rem);
      text-align: center;
      position: relative;
    }
    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        conic-gradient(from 0deg at 50% 50%, transparent 0deg, #ff6b6b 90deg, transparent 180deg, #4ecdc4 270deg, transparent 360deg);
      mask: radial-gradient(circle, transparent 30%, black 40%);
      animation: rotate 10s linear infinite;
      opacity: 0.2;
    }
    @keyframes rotate {
      to { transform: rotate(360deg); }
    }
    h1 { 
      font-size: clamp(3.5rem, 9vw, 7rem); 
      font-weight: 900; 
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
      position: relative;
      z-index: 1;
      opacity: 0; animation: slideIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.3s forwards;
    }
    .subtitle { 
      font-size: clamp(1.6rem, 4.5vw, 2.8rem); 
      font-weight: 700; 
      color: rgba(255,255,255,0.9);
      max-width: 75%;
      margin: 1rem 0 2rem;
      opacity: 0; animation: slideIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.8s forwards;
    }
    .tagline { 
      font-size: clamp(1.2rem, 3vw, 1.8rem); 
      color: rgba(255,255,255,0.7);
      opacity: 0; animation: slideIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) 1.3s forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: scale(0.8) translateY(50px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
</head>
<body>
  <section class="slide">
    <h1>Prism</h1>
    <p class="subtitle">The verification layer for AI-built software.</p>
    <p class="tagline">AI generates the code. Prism makes it safe to ship.</p>
  </section>
</body>
</html>
