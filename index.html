<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRISM by Stellarum</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <header class="titlebar">
        <div class="titlebar-top">
          <div class="titlebar-traffic-space"></div>
          <div class="titlebar-wordmark" aria-label="PRISM by Stellarum">
            <span class="wm-mark">PRISM</span>
            <span class="wm-sep">·</span>
            <span class="wm-house">STELLARUM</span>
            <span
              class="wm-instance"
              id="titlebar-dev-instance"
              hidden
              aria-label=""
            ></span>
          </div>
        </div>
        <div class="titlebar-bottom">
          <div id="tab-strip" class="tab-strip"></div>
        </div>
      </header>
      <div id="global-toolbar" class="global-toolbar">
        <div class="toolbar-section">
          <div class="toolbar-layout" id="toolbar-layout">
            <button class="toolbar-item layout-btn active" id="lb-sidebar" title="Toggle Sidebar (⌘B)">
              <svg class="tb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
            </button>
            <button class="toolbar-item layout-btn active" id="lb-terminal" title="Toggle Terminal">
              <svg class="tb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m4 11 4-4-4-4"/><path d="M12 18h8"/></svg>
            </button>
            <button class="toolbar-item layout-btn active" id="lb-preview" title="Toggle File Preview">
              <svg class="tb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            </button>
            <button class="toolbar-item layout-btn active" id="lb-console" title="Toggle AI Input">
              <svg class="tb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 15h18"/></svg>
            </button>
            <button class="toolbar-item layout-btn active" id="lb-agent" title="Toggle Agent Pane">
              <svg class="tb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button class="toolbar-item layout-btn" id="lb-problems" title="Toggle Problems Panel">
              <svg class="tb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M15 3v18"/></svg>
            </button>
            <button class="toolbar-item layout-btn" id="tb-protocols" title="Protocols" type="button" aria-haspopup="menu" aria-expanded="false">
              <svg class="tb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M7 8h6"/><path d="M7 16h10"/><circle cx="17" cy="8" r="2"/><circle cx="17" cy="16" r="2"/></svg>
            </button>
          </div>
        </div>
        <div class="toolbar-spacer"></div>
        <div class="toolbar-section">
          <div class="tb-indicator" id="tb-status" title="Substrate Readiness">
            <div class="indicator-dot status-ok"></div>
            <span>Substrate ready</span>
          </div>
          <div class="tb-sep"></div>
          <div class="energy-gauge" id="tb-energy" title="Credit Energy Level (Remaining Credits)">
            <div class="fuel-bar active"></div>
            <div class="fuel-bar active"></div>
            <div class="fuel-bar active"></div>
            <div class="fuel-bar active"></div>
            <div class="fuel-bar active"></div>
          </div>
          <div class="tb-sep"></div>
          <button class="toolbar-item" id="tb-settings" title="Settings">
            <svg class="tb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="workspaces"></div>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-overlay" class="settings-overlay" aria-hidden="true">
      <div id="settings-card" class="settings-card">
        <aside class="settings-sidebar">
          <div class="settings-sidebar-header">
            <span class="settings-title">Settings</span>
            <button id="settings-close" class="settings-close-btn" title="Close settings (Esc)">&times;</button>
          </div>
          <nav class="settings-nav">
            <button class="settings-nav-item active" data-tab="general">General</button>
            <button class="settings-nav-item" data-tab="models">AI Models</button>
            <button class="settings-nav-item" data-tab="usage">Usage</button>
            <button class="settings-nav-item" data-tab="skills">Prism Skills</button>
            <button class="settings-nav-item" data-tab="history">History</button>
            <button class="settings-nav-item" data-tab="substrate">Substrate</button>
            <button class="settings-nav-item" data-tab="about">About</button>
          </nav>
        </aside>
        <main id="settings-content" class="settings-main">
          <!-- Content injected here by settings-ui.ts -->
        </main>
      </div>
    </div>
    <!-- Reader Overlay (Pop-out Reader) -->
    <div id="reader-overlay" class="settings-overlay" aria-hidden="true">
      <div id="reader-card" class="settings-card reader-card">
        <header class="reader-header">
          <div class="reader-global-actions">
            <span class="reader-title">Pop-out Reader</span>
          </div>
          <div class="reader-actions">
            <button id="reader-split" class="settings-action-btn" title="Toggle Split View">
              <svg class="tb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 3v18"/></svg>
            </button>
            <button id="reader-clear-panes" class="settings-action-btn" type="button" title="Clear panes (reset after moved/deleted files)" aria-label="Clear reader panes">Clear</button>
            <button id="reader-save" class="settings-action-btn" style="display: none;">Save</button>
            <button id="reader-close" class="settings-close-btn" title="Close reader (Esc)">&times;</button>
          </div>
        </header>
        <main id="reader-content" class="reader-main">
          <!-- FileEditor instances and per-pane headers injected here -->
        </main>
      </div>
    </div>
    <!-- If the bundled app never mounts a workspace, explain next steps (runs without modules). -->
    <script>
      (function () {
        function showStaleShellHint() {
          if (window.__PRISM_MOUNTED) return;
          var w = document.getElementById("workspaces");
          if (!w || w.children.length > 0) return;
          var strip = document.getElementById("tab-strip");
          if (strip && strip.querySelector(".tab[data-id]")) return;
          w.innerHTML =
            '<div id="prism-shell-hint" style="box-sizing:border-box;padding:20px 24px;margin:16px;border:1px solid #64748b;border-radius:12px;background:#0f1419;color:#cbd5e1;font:13px/1.5 system-ui,sans-serif;max-width:42rem">' +
            "<strong style=\"display:block;margin-bottom:8px;color:#f1f5f9\">Workspace did not load.</strong>" +
            "The UI script may have failed before opening a tab (check <strong>View → Toggle Developer Tools</strong> or terminal logs). " +
            "Try: quit Prism, run <code style=\"background:#111827;padding:2px 6px;border-radius:4px\">pnpm install</code> then <code style=\"background:#111827;padding:2px 6px;border-radius:4px\">pnpm tauri dev</code>, " +
            "and clear site data for <code style=\"background:#111827;padding:2px 6px;border-radius:4px\">localhost</code> if storage is blocked." +
            "</div>";
        }
        window.addEventListener("DOMContentLoaded", function () {
          setTimeout(showStaleShellHint, 3500);
        });
      })();
    </script>
  </body>
</html>
